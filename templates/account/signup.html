<!DOCTYPE html>
<html lang="en" class="h-full" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' }" x-bind:class="{ 'dark': darkMode }" x-init="$watch('darkMode', val => localStorage.setItem('darkMode', val))">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — UPI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="h-full bg-gray-50 dark:bg-slate-900 flex items-center justify-center transition-colors duration-200">

<div class="w-full max-w-sm px-6">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
        <div class="w-12 h-12 bg-indigo-500 rounded-2xl flex items-center justify-center mb-4 shadow-lg">
            <span class="text-white text-2xl font-bold">₹</span>
        </div>
        <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Create account</h1>
        <p class="text-sm text-gray-500 dark:text-slate-400 mt-1">Start tracking your UPI payments</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 p-8 shadow-sm">

        {% if form.errors %}
        <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg px-4 py-3 mb-6">
            {% for field, errors in form.errors.items %}
                {% for error in errors %}
                <p class="text-sm text-red-600 dark:text-red-400">{{ error }}</p>
                {% endfor %}
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'account_signup' %}">
            {% csrf_token %}

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Username</label>
                    <input type="text" name="username" required autofocus
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Email <span class="text-gray-400 font-normal">(optional)</span></label>
                    <input type="email" name="email"
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Password</label>
                    <input type="password" name="password1" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Confirm password</label>
                    <input type="password" name="password2" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm transition-colors">
                </div>
            </div>

            <button type="submit"
                class="w-full mt-6 bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm">
                Create account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 dark:text-slate-400 mt-6">
            Already have an account?
            <a href="{% url 'account_login' %}" class="text-indigo-500 hover:text-indigo-600 font-medium">Sign in</a>
        </p>
    </div>

    <!-- Dark mode toggle -->
    <div class="flex justify-center mt-6">
        <button @click="darkMode = !darkMode" class="text-sm text-gray-400 dark:text-slate-500 hover:text-gray-600 dark:hover:text-slate-300 transition-colors">
            <span x-text="darkMode ? '☀️ Light mode' : '🌙 Dark mode'"></span>
        </button>
    </div>

</div>

</body>
</html>
