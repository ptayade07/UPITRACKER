<!DOCTYPE html>
<html lang="en" class="h-full" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' }" x-bind:class="{ 'dark': darkMode }" x-init="$watch('darkMode', val => localStorage.setItem('darkMode', val))">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out — UPI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="h-full bg-gray-50 dark:bg-slate-900 flex items-center justify-center transition-colors duration-200">

<div class="w-full max-w-sm px-6">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
        <div class="w-12 h-12 bg-indigo-500 rounded-2xl flex items-center justify-center mb-4 shadow-lg">
            <span class="text-white text-2xl font-bold">₹</span>
        </div>
        <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Sign out</h1>
        <p class="text-sm text-gray-500 dark:text-slate-400 mt-1">Are you sure you want to sign out?</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 p-8 shadow-sm text-center">

        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit"
                class="w-full bg-red-500 hover:bg-red-600 text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm">
                Yes, sign out
            </button>
        </form>

        <a href="/transactions/dashboard/"
            class="block mt-3 w-full bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 text-gray-700 dark:text-slate-300 font-medium py-2.5 px-4 rounded-lg transition-colors text-sm">
            Cancel
        </a>

    </div>

    <!-- Dark mode toggle -->
    <div class="flex justify-center mt-6">
        <button @click="darkMode = !darkMode" class="text-sm text-gray-400 dark:text-slate-500 hover:text-gray-600 dark:hover:text-slate-300 transition-colors">
            <span x-text="darkMode ? '☀️ Light mode' : '🌙 Dark mode'"></span>
        </button>
    </div>

</div>

</body>
</html>
